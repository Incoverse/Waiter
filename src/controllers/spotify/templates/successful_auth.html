<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Authentication Successful</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #101116;
      --card-bg: rgba(18, 19, 22, 0.82);
      --card-border: rgba(255,255,255,0.10);
      --card-border-bright: #3a3a4d;
      --accent: #9147ff;
      --text: #e6e6ea;
      --muted: #b0b0c0;
      --success: #3fffa8;
      --shadow: 0 8px 32px 0 rgba(0,0,0,0.32);
    }
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      font-weight: 400;
      letter-spacing: 0.01em;
      overflow: hidden;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      position: relative;
      z-index: 1;
    }
    .bg-visuals {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .bg-gradient {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px) saturate(1.2);
      opacity: 0.22;
      pointer-events: none;
      animation: float 12s ease-in-out infinite alternate;
    }
    .bg-gradient1 {
      width: 520px; height: 520px;
      left: -180px; top: -120px;
      background: radial-gradient(circle at 30% 30%, #9147ff 0%, #23262f 100%);
      animation-delay: 0s;
    }
    .bg-gradient2 {
      width: 400px; height: 400px;
      right: -120px; bottom: -100px;
      background: radial-gradient(circle at 70% 70%, #3fffa8 0%, #101116 100%);
      animation-delay: 2s;
    }
    .bg-gradient3 {
      width: 320px; height: 320px;
      left: 60vw; top: 60vh;
      background: radial-gradient(circle at 60% 60%, #fff 0%, #9147ff 100%);
      opacity: 0.10;
      animation-delay: 4s;
    }
    @keyframes float {
      0% { transform: translateY(0) scale(1); }
      100% { transform: translateY(-30px) scale(1.08); }
    }
    .particles {
      position: absolute;
      inset: 0;
      width: 100vw;
      height: 100vh;
      z-index: 1;
      pointer-events: none;
    }
    .particle {
      position: absolute;
      border-radius: 50%;
      opacity: 0.13;
      background: #fff;
      animation: particleMove 16s linear infinite;
    }
    .particle1 { width: 8px; height: 8px; left: 12vw; top: 80vh; animation-delay: 0s; }
    .particle2 { width: 6px; height: 6px; left: 80vw; top: 20vh; animation-delay: 3s; }
    .particle3 { width: 10px; height: 10px; left: 60vw; top: 60vh; animation-delay: 7s; }
    .particle4 { width: 7px; height: 7px; left: 30vw; top: 30vh; animation-delay: 10s; }
    .particle5 { width: 5px; height: 5px; left: 50vw; top: 10vh; animation-delay: 13s; }
    @keyframes particleMove {
      0% { transform: translateY(0) scale(1); }
      100% { transform: translateY(-60px) scale(1.2); }
    }
    .card {
      background: var(--card-bg);
      border-radius: 20px;
      box-shadow: var(--shadow);
      padding: 2.5rem 2.5rem 2rem 2.5rem;
      max-width: 410px;
      width: 100%;
      text-align: center;
      animation: fadeIn 0.8s cubic-bezier(.4,0,.2,1);
      border: 1.5px solid var(--card-border);
      border-top: 1.5px solid var(--card-border-bright);
      backdrop-filter: blur(8px) saturate(1.2);
      -webkit-backdrop-filter: blur(8px) saturate(1.2);
      transition: box-shadow 0.2s, border 0.2s;
    }
    .card:hover {
      box-shadow: 0 12px 40px 0 rgba(0,0,0,0.38);
    }
    .icon {
      margin-bottom: 1.5rem;
      display: flex;
      justify-content: center;
    }
    .icon svg {
      width: 56px;
      height: 56px;
      fill: none;
      stroke: var(--success);
      stroke-width: 3.5;
      filter: drop-shadow(0 0 8px #3fffa822);
      opacity: 0.92;
    }
    h1 {
      font-size: 1.45rem;
      font-weight: 500;
      margin: 0 0 0.5rem 0;
      color: var(--text);
      letter-spacing: -0.5px;
      opacity: 0.96;
    }
    p {
      color: var(--muted);
      font-size: 1.08rem;
      margin-bottom: 2.1rem;
      font-weight: 400;
      line-height: 1.6;
      opacity: 0.92;
    }
    .close-btn {
      background: linear-gradient(90deg, #23262f 0%, #181a20 100%);
      color: #fff;
      border: 1.5px solid rgba(255,255,255,0.13);
      border-radius: 10px;
      padding: 0.8rem 1.7rem;
      font-size: 1.08rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.18s, color 0.18s, border 0.18s, box-shadow 0.18s;
      box-shadow: 0 2px 12px 0 #23262f33, 0 1.5px 0 0 #9147ff44 inset;
      outline: none;
      letter-spacing: 0.01em;
      position: relative;
      overflow: hidden;
    }
    .close-btn:hover, .close-btn:focus {
      background: linear-gradient(90deg, #23262f 0%, #181a20 100%);
      color: #fff;
      border: 1.5px solid var(--accent);
      box-shadow: 0 0 0 2px #9147ff44, 0 2px 12px 0 #23262f33, 0 1.5px 0 0 #9147ff44 inset;
      filter: brightness(1.08);
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(32px); }
      to { opacity: 1; transform: none; }
    }
    @media (max-width: 500px) {
      .card { padding: 1.2rem 0.2rem 1.2rem 0.2rem; }
      h1 { font-size: 1.1rem; }
    }
  </style>
</head>
<body>
  <div class="bg-visuals">
    <div class="bg-gradient bg-gradient1"></div>
    <div class="bg-gradient bg-gradient2"></div>
    <div class="bg-gradient bg-gradient3"></div>
    <div class="particles">
      <div class="particle particle1"></div>
      <div class="particle particle2"></div>
      <div class="particle particle3"></div>
      <div class="particle particle4"></div>
      <div class="particle particle5"></div>
    </div>
  </div>
  <div class="card">
    <div class="icon">
      <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="24" cy="24" r="22" stroke="#23262f" stroke-width="2.5"/>
        <path d="M36 18L22 32L14 24" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <h1>Authentication Successful</h1>
    <p>You can safely close this page.<br>Thank you for authenticating with Waiter.</p>
    <button class="close-btn" onclick="window.close()">Close</button>
  </div>
</body>
</html>
